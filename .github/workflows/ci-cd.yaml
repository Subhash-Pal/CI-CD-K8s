name: ci-cd

on:
  push:
    branches:
      - main
  pull_request:

env:
  K8S_NAMESPACE: go-cd-demo
  KIND_CLUSTER_NAME: go-cd-demo
  API_IMAGE: ci-cd-k8s-api
  QUOTE_IMAGE: ci-cd-k8s-quote

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/api ./cmd/quote-service

  deploy-kind:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kind
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}

      - name: Build API image
        run: docker build -f Dockerfile.api -t "${API_IMAGE}:${GITHUB_SHA}" .

      - name: Build quote service image
        run: docker build -f Dockerfile.quote-service -t "${QUOTE_IMAGE}:${GITHUB_SHA}" .

      - name: Load images into kind
        run: |
          kind load docker-image "${API_IMAGE}:${GITHUB_SHA}" --name "${KIND_CLUSTER_NAME}"
          kind load docker-image "${QUOTE_IMAGE}:${GITHUB_SHA}" --name "${KIND_CLUSTER_NAME}"

      - name: Deploy manifests
        run: kubectl apply -k k8s --validate=false

      - name: Update images
        run: |
          kubectl -n "${K8S_NAMESPACE}" set image deployment/api api="${API_IMAGE}:${GITHUB_SHA}"
          kubectl -n "${K8S_NAMESPACE}" set image deployment/quote-service quote-service="${QUOTE_IMAGE}:${GITHUB_SHA}"

      - name: Wait for rollout
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/api --timeout=180s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/quote-service --timeout=180s

      - name: Smoke test API
        run: |
          kubectl -n "${K8S_NAMESPACE}" port-forward service/api 18080:80 >/tmp/port-forward.log 2>&1 &
          sleep 5
          curl -fsS http://127.0.0.1:18080/api
